# jtsekret configuration file
# Location: ~/.config/jtsekret/jtsekret.yaml or ./.jtsekret.yaml
#
# Environment variables override config values with JTSEKRET_ prefix.
# Example: JTSEKRET_BACKEND_LOCKBOX_FOLDER_ID overrides backend.lockbox.folder_id

backend:
  # Backend type: lockbox, github, mock
  type: lockbox

  # Yandex Cloud Lockbox configuration
  lockbox:
    # Folder ID from Yandex Cloud console
    folder_id: "b1g1234567890abcdefghijklmnopqrstu"

    # Authentication configuration — choose one of the types below:
    auth:
      # --- Option 1: OAuth token (permanent, personal account) ---
      # Get at: https://oauth.yandex.ru/authorize?response_type=token&client_id=1a6990aa636648e9b2ef855fa7bec2fb
      # Env var: YC_OAUTH_TOKEN
      # type: oauth
      # token: ""

      # --- Option 2: IAM token (short-lived, personal account) ---
      # Generate: yc iam create-token
      # Env var: YC_IAM_TOKEN
      # type: iam_token
      # token: ""

      # --- Option 3: Service account key file (recommended for automation) ---
      # Generate: yc iam key create --service-account-id <id> --output key.json
      # Env var: YC_SERVICE_ACCOUNT_KEY_FILE
      # type: service_account_key
      # service_account_file: "/path/to/key.json"

      # --- Option 4: Instance service account (for Yandex Cloud VMs) ---
      # No credentials needed — uses VM metadata service automatically
      # type: instance_service_account

      type: oauth

  # GitHub private repo backend (encrypted-at-rest in your own private repo)
  # github:
  #   # Either "owner/repo" shorthand (-> https://github.com/owner/repo.git),
  #   # full HTTPS/SSH URL, or file:// path (useful for tests/local sync).
  #   repo: "jtprogru/my-secrets"
  #   branch: main
  #   # Where the repo is cloned locally (supports ~).
  #   local_path: "~/.cache/jtsekret/repo"
  #   # Auto pull/push on each operation. Set to false and use `jtsekret sync`
  #   # for manual control (sync command lands in a later release).
  #   auto_pull: true
  #   auto_push: true
  #   auth:
  #     # type: token  -> GitHub PAT (env JTSEKRET_GITHUB_TOKEN overrides)
  #     # type: ssh    -> ssh-agent or explicit ssh_key_path
  #     # type: none   -> file:// or pre-authenticated remotes
  #     type: token
  #     token: ""              # prefer JTSEKRET_GITHUB_TOKEN env var
  #     # ssh_key_path: "~/.ssh/id_ed25519"
  #     # ssh_key_password: ""
  #
  # Master password for the github backend's at-rest AES-GCM encryption is
  # taken from JTSEKRET_GITHUB_MASTER_PASSWORD; if unset it falls back to
  # JTSEKRET_CACHE_MASTER_PASSWORD.

# Local encrypted cache configuration
cache:
  # Enable/disable cache
  enabled: true

  # Cache TTL in seconds (default: 3600 = 1 hour)
  ttl: 3600

  # Cache file path (supports ~ for home directory)
  path: "~/.cache/jtsekret/cache.enc"

  # Master password for cache encryption
  # IMPORTANT: Set via JTSEKRET_CACHE_MASTER_PASSWORD environment variable
  # Do not store password in this file!

# Output configuration
output:
  # Output format: plain, table, json
  # - plain: plain text output (default, for pipe usage)
  # - table: formatted table for terminal
  # - json: JSON output for scripting
  format: plain

  # Key separator for multiple keys (used in plain output)
  key_separator: "\n"

# Logging configuration
log:
  # Log level: debug, info, warn, error
  level: warn
