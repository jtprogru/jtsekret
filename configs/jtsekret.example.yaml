# jtsekret configuration file
# Location: ~/.config/jtsekret/jtsekret.yaml or ./.jtsekret.yaml
#
# Environment variables override config values with JTSEKRET_ prefix.
# Example: JTSEKRET_BACKEND_LOCKBOX_FOLDER_ID overrides backend.lockbox.folder_id

backend:
  # Backend type: github (default, personal-first), lockbox, file, mock.
  type: github

  # ---------------------------------------------------------------------
  # GitHub private repo backend — your own private GitHub repo as storage,
  # AES-256-GCM encrypted at rest with an Argon2id-derived key.
  # ---------------------------------------------------------------------
  github:
    # Either "owner/repo" shorthand (-> https://github.com/owner/repo.git),
    # a full HTTPS/SSH URL, or a file:// path (useful for tests / local sync).
    repo: "jtprogru/my-secrets"
    branch: main
    # Where the repo is cloned locally (supports ~).
    local_path: "~/.cache/jtsekret/repo"
    # Auto pull/push on every read/write. Set both to false and use
    # `jtsekret sync` for manual control.
    auto_pull: true
    auto_push: true
    auth:
      # type: token  -> GitHub PAT (env JTSEKRET_GITHUB_TOKEN overrides)
      # type: ssh    -> ssh-agent or explicit ssh_key_path
      # type: none   -> file:// or pre-authenticated remotes
      type: token
      token: ""              # prefer JTSEKRET_GITHUB_TOKEN env var
      # ssh_key_path: "~/.ssh/id_ed25519"
      # ssh_key_password: ""
  #
  # Master password for the github backend's at-rest AES-GCM encryption is
  # taken from JTSEKRET_GITHUB_MASTER_PASSWORD; if unset it falls back to
  # JTSEKRET_CACHE_MASTER_PASSWORD.

  # ---------------------------------------------------------------------
  # Yandex Cloud Lockbox backend.
  #
  # Token glossary (these two are NOT interchangeable):
  #
  #   YC_OAUTH_TOKEN  Long-lived (~1 year) Yandex Passport OAuth token.
  #                   Issued by Yandex's OAuth server. The SDK swaps it
  #                   for a fresh IAM token on each call. Get one at
  #                   https://oauth.yandex.ru/authorize?response_type=token&client_id=1a6990aa636648e9b2ef855fa7bec2fb
  #
  #   YC_IAM_TOKEN    Short-lived (~12h) IAM token, scoped to Yandex Cloud
  #                   resources only. Produced by `yc iam create-token`.
  #
  # Recommended setup: install `yc` CLI, run `jtsekret login yc` once
  # (or `yc init` directly), then leave auth.type at "auto" — jtsekret
  # will refresh IAM tokens by invoking yc each call.
  # ---------------------------------------------------------------------
  # lockbox:
  #   folder_id: "b1g1234567890abcdefghijklmnopqrstu"
  #   auth:
  #     # auto: probe explicit token -> YC_IAM_TOKEN -> YC_OAUTH_TOKEN
  #     #       -> service-account key -> `yc iam create-token`. Recommended.
  #     # oauth | iam_token | service_account_key | instance_service_account
  #     type: auto

  # ---------------------------------------------------------------------
  # Local file backend — fully offline encrypted-at-rest storage with the
  # same on-disk layout as the github backend, minus git. Useful for
  # air-gapped use, single-device personal storage, and as a destination
  # for `jtsekret migrate` exports/imports.
  # ---------------------------------------------------------------------
  # file:
  #   path: "~/.local/share/jtsekret/store"   # secrets/<name>.{enc,meta.json} live here
  #
  # Master password is taken from JTSEKRET_FILE_MASTER_PASSWORD; if unset
  # it falls back to JTSEKRET_CACHE_MASTER_PASSWORD.

# Local encrypted cache configuration
cache:
  # Enable/disable cache
  enabled: true

  # Cache TTL in seconds (default: 3600 = 1 hour)
  ttl: 3600

  # Cache file path (supports ~ for home directory)
  path: "~/.cache/jtsekret/cache.enc"

  # Master password for cache encryption
  # IMPORTANT: Set via JTSEKRET_CACHE_MASTER_PASSWORD environment variable
  # Do not store password in this file!

# Output configuration
output:
  # Output format: plain, table, json
  # - plain: plain text output (default, for pipe usage)
  # - table: formatted table for terminal
  # - json: JSON output for scripting
  format: plain

  # Key separator for multiple keys (used in plain output)
  key_separator: "\n"

# Logging configuration
log:
  # Log level: debug, info, warn, error
  level: warn
